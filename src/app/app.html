<!-- Global notifications container -->
<app-toast></app-toast>

<!-- Dynamic System-wide Announcement Banner -->
@if (announcement() && announcement()?.active) {
  <div class="bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold px-4 py-2 text-center text-xs flex items-center justify-center space-x-2 select-none shrink-0 relative z-50">
    <span>📢 SYSTEM ANNOUNCEMENT:</span>
    <span class="font-semibold">{{ announcement()?.text }}</span>
  </div>
}

@if (authService.isAuthenticated()) {
  <div class="min-h-screen bg-slate-950 flex flex-col md:flex-row">
    <!-- Sidebar Navigation -->
    <app-navbar class="shrink-0"></app-navbar>

    <!-- Main Page Content Frame -->
    <main class="flex-1 md:pl-64 min-w-0">
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <div class="min-h-screen bg-slate-950 flex flex-col">
    <!-- Simple Header Navigation -->
    <app-navbar class="shrink-0"></app-navbar>

    <!-- Full-screen Page Frame -->
    <main class="flex-1 pt-16 min-w-0">
      <router-outlet></router-outlet>
    </main>
  </div>
}
