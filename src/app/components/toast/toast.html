<div class="fixed top-4 right-4 z-50 flex flex-col space-y-3 max-w-sm w-full pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-center justify-between p-4 rounded-xl shadow-xl backdrop-blur-md border animate-toast-slide-in"
      [class.bg-emerald-950\/85]="toast.type === 'success'"
      [class.border-emerald-500\/30]="toast.type === 'success'"
      [class.text-emerald-300]="toast.type === 'success'"
      [class.bg-rose-950\/85]="toast.type === 'error'"
      [class.border-rose-500\/30]="toast.type === 'error'"
      [class.text-rose-300]="toast.type === 'error'"
      [class.bg-slate-900\/90]="toast.type === 'info'"
      [class.border-slate-700\/40]="toast.type === 'info'"
      [class.text-slate-300]="toast.type === 'info'"
    >
      <div class="flex items-center space-x-3">
        @if (toast.type === 'success') {
          <svg class="h-5 w-5 text-emerald-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        } @else if (toast.type === 'error') {
          <svg class="h-5 w-5 text-rose-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        } @else {
          <svg class="h-5 w-5 text-cyan-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        }
        <span class="text-sm font-medium">{{ toast.message }}</span>
      </div>

      <button
        (click)="toastService.dismiss(toast.id)"
        class="ml-4 p-1 rounded-lg hover:bg-white/10 transition-colors pointer-events-auto"
        type="button"
      >
        <svg class="h-4 w-4 opacity-70 hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
